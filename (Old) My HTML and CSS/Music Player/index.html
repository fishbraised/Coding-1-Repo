<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Music Player</title>
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="index.css" type="text/css" />
  </head>
  <body>
    <header>
      <img class="music-logo" src="images/logo.png" alt="music logo" />
      <h1 class="header-h">Music Destination</h1>
    </header>

    <main>
      <section class="section-size upcoming-section">
        <div class="section-heading-container">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            fill="currentColor"
            class="bi bi-stack large-black-icon"
            viewBox="0 0 16 16"
          >
            <path
              d="m14.12 10.163 1.715.858c.22.11.22.424 0 .534L8.267 15.34a.598.598 0 0 1-.534 0L.165 11.555a.299.299 0 0 1 0-.534l1.716-.858 5.317 2.659c.505.252 1.1.252 1.604 0l5.317-2.66zM7.733.063a.598.598 0 0 1 .534 0l7.568 3.784a.3.3 0 0 1 0 .535L8.267 8.165a.598.598 0 0 1-.534 0L.165 4.382a.299.299 0 0 1 0-.535L7.733.063z"
            />
            <path
              d="m14.12 6.576 1.715.858c.22.11.22.424 0 .534l-7.568 3.784a.598.598 0 0 1-.534 0L.165 7.968a.299.299 0 0 1 0-.534l1.716-.858 5.317 2.659c.505.252 1.1.252 1.604 0l5.317-2.659z"
            />
          </svg>
          <h1 class="large-black-heading">Upcoming Songs</h1>
        </div>
        <div class="section-content-container hover-effect">
          <div class="card card1"></div>
          <div class="card card2"></div>
          <div class="card card3"></div>
          <div class="card card4"></div>
        </div>
      </section>

      <section class="section-size latest-section">
        <div class="section-heading-container">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            fill="currentColor"
            class="bi bi-music-note-beamed large-black-icon"
            viewBox="0 0 16 16"
          >
            <path
              d="M6 13c0 1.105-1.12 2-2.5 2S1 14.105 1 13c0-1.104 1.12-2 2.5-2s2.5.896 2.5 2zm9-2c0 1.105-1.12 2-2.5 2s-2.5-.895-2.5-2 1.12-2 2.5-2 2.5.895 2.5 2z"
            />
            <path fill-rule="evenodd" d="M14 11V2h1v9h-1zM6 3v10H5V3h1z" />
            <path
              d="M5 2.905a1 1 0 0 1 .9-.995l8-.8a1 1 0 0 1 1.1.995V3L5 4V2.905z"
            />
          </svg>
          <h1 class="large-black-heading">Latest Release</h1>
        </div>
        <div class="section-content-container">
          <div class="twocard">
            <img
              class="twocard-img"
              src="images/imagination-poster.jfif"
              alt="imagination poster"
            />
            <div class="twocard-container">
              <h3 class="release-name">Imagination</h3>
              <h4 class="release-date">Aug 11, 2018</h4>
            </div>
          </div>

          <div class="twocard">
            <img
              class="twocard-img"
              src="images/imagination-poster.jfif"
              alt="imagination poster"
            />
            <div class="twocard-container">
              <h3 class="release-name">Imagination</h3>
              <h4 class="release-date">Aug 11, 2018</h4>
            </div>
          </div>

          <div class="twocard">
            <img
              class="twocard-img"
              src="images/imagination-poster.jfif"
              alt="imagination poster"
            />
            <div class="twocard-container">
              <h3 class="release-name">Imagination</h3>
              <h4 class="release-date">Aug 11, 2018</h4>
            </div>
          </div>

          <div class="twocard">
            <img
              class="twocard-img"
              src="images/carousel2.jpg"
              alt="carousel poster"
            />
            <div class="twocard-container">
              <h3 class="release-name">Heavy</h3>
              <h4 class="release-date">Aug 11, 2018</h4>
            </div>
          </div>

          <div class="twocard">
            <img
              class="twocard-img"
              src="images/attention.png"
              alt="attention poster"
            />
            <div class="twocard-container">
              <h3 class="release-name">Attention</h3>
              <h4 class="release-date">Aug 11, 2018</h4>
            </div>
          </div>

          <div class="twocard">
            <img
              class="twocard-img"
              src="images/happier.jpg"
              alt="happier poster"
            />
            <div class="twocard-container">
              <h3 class="release-name">Happier</h3>
              <h4 class="release-date">Aug 11, 2018</h4>
            </div>
          </div>
        </div>
      </section>

      <section class="section-size artist-section">
        <div class="section-heading-container">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            fill="currentColor"
            class="bi bi-people-fill large-black-icon"
            viewBox="0 0 16 16"
          >
            <path
              d="M7 14s-1 0-1-1 1-4 5-4 5 3 5 4-1 1-1 1H7Zm4-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6Zm-5.784 6A2.238 2.238 0 0 1 5 13c0-1.355.68-2.75 1.936-3.72A6.325 6.325 0 0 0 5 9c-4 0-5 3-5 4s1 1 1 1h4.216ZM4.5 8a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5Z"
            />
          </svg>
          <h1 class="large-black-heading">Artist</h1>
        </div>
        <div class="section-content-container">
          <div class="round-img">
            <img src="images/shawn-mendes-main.jpg" alt="Shawn Mendes" />
          </div>

          <img
            class="round-img"
            src="images/charlie-puth.jpg"
            alt="Charlie Puth"
          />

          <img
            class="round-img"
            src="images/camilla-cabelo.jfif"
            alt="Camila Cabelo"
          />

          <img
            class="round-img"
            src="images/taylorswift1.jpg"
            alt="Taylor Swift"
          />

          <img
            class="round-img"
            src="images/chainsmokers-main.jpg"
            alt="The Chainsmokers"
          />
        </div>
      </section>

      <section class="section-size stations-section">
        <div class="section-heading-container">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            fill="currentColor"
            class="bi bi-cloud-fill large-black-icon"
            viewBox="0 0 16 16"
          >
            <path
              d="M4.406 3.342A5.53 5.53 0 0 1 8 2c2.69 0 4.923 2 5.166 4.579C14.758 6.804 16 8.137 16 9.773 16 11.569 14.502 13 12.687 13H3.781C1.708 13 0 11.366 0 9.318c0-1.763 1.266-3.223 2.942-3.593.143-.863.698-1.723 1.464-2.383z"
            />
          </svg>
          <h1 class="large-black-heading">Stations</h1>
        </div>
      </section>

      <section class="section-size mood-section">
        <div class="section-heading-container">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            fill="currentColor"
            class="bi bi-emoji-laughing-fill large-black-icon"
            viewBox="0 0 16 16"
          >
            <path
              d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16zM7 6.5c0 .501-.164.396-.415.235C6.42 6.629 6.218 6.5 6 6.5c-.218 0-.42.13-.585.235C5.164 6.896 5 7 5 6.5 5 5.672 5.448 5 6 5s1 .672 1 1.5zm5.331 3a1 1 0 0 1 0 1A4.998 4.998 0 0 1 8 13a4.998 4.998 0 0 1-4.33-2.5A1 1 0 0 1 4.535 9h6.93a1 1 0 0 1 .866.5zm-1.746-2.765C10.42 6.629 10.218 6.5 10 6.5c-.218 0-.42.13-.585.235C9.164 6.896 9 7 9 6.5c0-.828.448-1.5 1-1.5s1 .672 1 1.5c0 .501-.164.396-.415.235z"
            />
          </svg>
          <h1 class="large-black-heading">Mood</h1>
        </div>
      </section>

      <section class="section-size latest-english-section">
        <div class="section-heading-container">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            fill="currentColor"
            class="bi bi-disc-fill large-black-icon"
            viewBox="0 0 16 16"
          >
            <path
              d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-6 0a2 2 0 1 0-4 0 2 2 0 0 0 4 0zM4 8a4 4 0 0 1 4-4 .5.5 0 0 0 0-1 5 5 0 0 0-5 5 .5.5 0 0 0 1 0zm9 0a.5.5 0 1 0-1 0 4 4 0 0 1-4 4 .5.5 0 0 0 0 1 5 5 0 0 0 5-5z"
            />
          </svg>
          <h1 class="large-black-heading">Latest-English</h1>
        </div>
      </section>

      <section class="section-size latest-hindi-section">
        <div class="section-heading-container">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            fill="currentColor"
            class="bi bi-disc-fill large-black-icon"
            viewBox="0 0 16 16"
          >
            <path
              d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-6 0a2 2 0 1 0-4 0 2 2 0 0 0 4 0zM4 8a4 4 0 0 1 4-4 .5.5 0 0 0 0-1 5 5 0 0 0-5 5 .5.5 0 0 0 1 0zm9 0a.5.5 0 1 0-1 0 4 4 0 0 1-4 4 .5.5 0 0 0 0 1 5 5 0 0 0 5-5z"
            />
          </svg>
          <h1 class="large-black-heading">Latest-Hindi</h1>
        </div>
      </section>
    </main>
  </body>
</html>
