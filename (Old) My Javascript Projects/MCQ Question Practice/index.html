<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title></title>
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="index.css" type="text/css" />
  </head>
  <body>
    <div class="bg-con">
      <div>
        <h1 class="title">Select Your Favorite Place</h1>

        <div class="row">
          <input
            class="radio-btn"
            id="radioBtn1"
            type="radio"
            name="radio"
            value="Lucknow"
          />
          <label class="label-text" id="labelText1" for="radioBtn1"
            >Lucknow</label
          >
        </div>

        <div class="row">
          <input
            class="radio-btn"
            id="radioBtn2"
            type="radio"
            name="radio"
            value="Agra"
          />
          <label class="label-text" id="labelText2" for="radioBtn2">Agra</label>
        </div>

        <div class="row">
          <input
            class="radio-btn"
            id="radioBtn3"
            type="radio"
            name="radio"
            value="Varanasi"
          />
          <label class="label-text" id="labelText3" for="radioBtn3"
            >Varanasi</label
          >
        </div>

        <button class="submit-btn" id="submitBtn">Submit</button>
        <p class="submit-text" id="submitText"></p>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
