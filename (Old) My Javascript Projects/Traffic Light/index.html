<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Traffic Light</title>
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="index.css" type="text/css" />
  </head>
  <body>
    <div class="bg-container">
      <div class="content-container">
        <h1 class="traffic-heading">Traffic Light</h1>

        <div class="button-light-container">
          <div class="button-container">
            <button class="button" id="redButton" onclick="redLightOn()">
              Stop
            </button>
            <button class="button" id="yellowButton" onclick="yellowLightOn()">
              Ready
            </button>
            <button class="button" id="greenButton" onclick="greenLightOn()">
              Go
            </button>
          </div>

          <div class="light-container">
            <div class="light-sub-container">
              <div class="light" id="redLight"></div>
              <div class="light" id="yellowLight"></div>
              <div class="light" id="greenLight"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
