<!DOCTYPE html>
<html>
  <head>
    <link href="index.css" rel="stylesheet" type="text/css" />
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
      integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z"
      crossorigin="anonymous"
    />
    <script
      src="https://code.jquery.com/jquery-3.5.1.slim.min.js"
      integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"
      integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"
      integrity="sha384-B4gt1jrGC7Jh4AgTPSdUtOBvfO8shuf57BaghqFfPlYxofvL8/KUEfYiJOMMV+rV"
      crossorigin="anonymous"
    ></script>
  </head>

  <body>
    <div class="bg-container">
      <h1 class="heading">Time Converter</h1>
      <p class="sub-title">
        Enter hours and minutes <br />
        values to convert into <br />
        seconds
      </p>
      <div>
        <form id="convertForm">
          <label for="hoursInput" class="label">Hours *</label> <br />
          <input type="text" id="hoursInput" class="form-content mb-2" /> <br />
          <label for="minutesInput" class="label">Minutes *</label> <br />
          <input type="text" id="minutesInput" class="form-content mb-2" />
          <br />
          <div>
            <button class="button" id="convertBtn" type="submit">
              Convert to Seconds
            </button>
          </div>
          <p id="timeInSeconds"></p>
          <p class="error-text" id="errorMsg"></p>
        </form>
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
