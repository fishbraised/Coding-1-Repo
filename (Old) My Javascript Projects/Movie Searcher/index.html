<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="X-UA-Compati
    ble"
      content="IE=edge"
    />
    <title></title>
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="index.css" type="text/css" />
    <script
      src="https://kit.fontawesome.com/eb13f2544c.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div class="bg-con">
      <h1 class="website-name">Movie Searcher</h1>
      <p class="attribution">Made by Lewis Lye</p>

      <form class="input-con" id="inputCon">
        <input
          class="search-input"
          id="searchInput"
          type="search"
          placeholder="Search for a movie"
        />

        <button class="icon-con" id="iconCon" type="submit">
          <i class="fa-solid fa-magnifying-glass icon"></i>
        </button>
      </form>

      <div class="line-break"></div>

      <div class="loader hide" id="loader"></div>
      <div class="results-con" id="resultsCon"></div>
    </div>
    <script src="index.js" type="text/javascript"></script>
  </body>
</html>
