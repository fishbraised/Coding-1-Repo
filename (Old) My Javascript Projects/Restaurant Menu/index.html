<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Restaurant Menu</title>
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="index.css" type="text/css" />
    <script
      src="https://kit.fontawesome.com/eb13f2544c.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div class="bg-container">
      <div class="content-container">
        <h1 class="title-1 space-capitalize">Restaurant Menu</h1>
        <div class="separator"></div>

        <div class="buttons-container" id="buttonsContainer"></div>

        <hr />

        <section class="menu-section" id="menuSection"></section>

        <section class="review-section">
          <h1 class="title-2 space-capitalize">Our Reviews</h1>
          <div class="separator"></div>

          <article class="review-item">
            <img
              class="review-img"
              id="reviewImg"
              src="https://res.cloudinary.com/diqqf3eq2/image/upload/v1586883334/person-1_rfzshl.jpg"
              alt="person img"
            />
            <h4 class="review-name space-capitalize" id="reviewName">
              Sara Jones
            </h4>
            <p class="review-job" id="reviewJob">UX DESIGNER</p>
            <p class="review-desc" id="reviewDesc">
              Lorem ipsum dolor sit amet consectetur adipisicing elit. Iusto
              asperiores debitis incidunt, eius earum ipsam cupiditate libero?
              Iste, doloremque nihil?
            </p>

            <div class="arrow-buttons-container">
              <i
                class="fa-solid fa-chevron-left arrow-icon"
                id="previousBtn"
              ></i>
              <i class="fa-solid fa-chevron-right arrow-icon" id="nextBtn"></i>
            </div>
            <button class="suprise-button" id="supriseBtn">Suprise Me</button>
          </article>
        </section>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
