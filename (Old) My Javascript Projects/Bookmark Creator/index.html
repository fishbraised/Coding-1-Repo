<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title></title>
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="index.css" type="text/css" />
  </head>
  <body>
    <div class="bg-con">
      <h3 class="greeting">Hello, John!</h3>
      <h1 class="heading">Bookmark Creator</h1>
      <section class="bottom-section">
        <h3 class="heading">Bookmark your favorite sites!</h3>
        <form id="formCon">
          <label class="title">SITE NAME</label>
          <br />
          <input class="input-field" id="siteName" type="text" />
          <br />
          <p class="error-msg" id="nameError"></p>
          <label class="title">SITE URL</label>
          <br />
          <input class="input-field" id="siteUrl" type="url" />
          <br />
          <p class="error-msg" id="urlError"></p>
          <div class="submit-btn-con">
            <button class="submit-btn" id="submitBtn" type="submit">
              Submit
            </button>
          </div>
        </form>
        <ul class="bookmark-list" id="bookmarkList"></ul>
      </section>
    </div>
    <script src="index.js" type="text/javascript"></script>
  </body>
</html>
