<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title></title>
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="index.css" type="text/css" />
    <script src="index.js"></script>
  </head>
  <body>
    <main>
      <section class="content-container" id="contentContainer">
        <h1 class="color-picker-heading">Color Picker</h1>
        <div class="button-container">
          <button class="button button1" onclick="bgColorGray()">
            #e0e0e0
          </button>
          <button class="button button2" onclick="bgColorGreen()">
            #6fcf97
          </button>
          <button class="button button3" onclick="bgColorBlue()">
            #56ccf2
          </button>
          <button class="button button4" onclick="bgColorPink()">
            #bb6bd9
          </button>
        </div>
        <p class="black-span">
          Background Color : <span id="blackSpan">#ffffff</span>
        </p>
        <p class="black-text">
          Try clicking on one of the colors above to change<br />the background
          color of this page!
        </p>
      </section>
    </main>
  </body>
</html>
