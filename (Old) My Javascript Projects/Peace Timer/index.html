<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title></title>
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="index.css" type="text/css" />
  </head>
  <body>
    <div class="bg-container">
      <div class="content-container">
        <h1 class="title">A Moment of Peace</h1>
        <p class="desc">
          Turn off your phone, put on your headphones and take a moment for
          yourself.
        </p>
        <hr class="line" />
        <h1 class="query">How long would you like your moment to be?</h1>
        <div class="row">
          <button class="btn" id="twentySecondsBtn">20 Seconds</button>
          <button class="btn" id="thirtySecondsBtn">30 Seconds</button>
          <button class="btn" id="fortySecondsBtn">40 Seconds</button>
          <button class="btn" id="oneMinuteBtn">60 Seconds</button>
        </div>
        <h3 class="counter" id="counter"></h3>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
