<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title></title>
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="index.css" type="text/css" />
  </head>
  <body>
    <div class="bg-container">
      <h1 class="counter-heading">Custom Range Counter</h1>
      <input
        class="counter-input"
        id="fromUserInput"
        type="text"
        placeholder="Enter From Value"
      />
      <input
        class="counter-input"
        id="toUserInput"
        type="text"
        placeholder="Enter To Value"
      />
      <button class="counter-btn" id="counterBtn">Start</button>
      <h1 class="counter-text" id="counterText">0</h1>
    </div>
    <script src="index.js"></script>
  </body>
</html>
